<!DOCTYPE html>

<html>
  <body style="margin:0; padding:0; background:#f4f6f8; font-family:Arial, sans-serif;">
    <table width="100%" cellpadding="0" cellspacing="0">
      <tr>
        <td align="center">
          <table width="400" style="background:#ffffff; margin-top:40px; border-radius:10px; overflow:hidden; box-shadow:0 4px 20px rgba(0,0,0,0.08);">
        <tr>
          <td style="background:#111827; padding:20px; text-align:center; color:#ffffff;">
            <h2 style="margin:0;">🛍️ Trialshopy</h2>
          </td>
        </tr>

        <tr>
          <td style="padding:30px; text-align:center;">
            <h3 style="margin-bottom:10px; color:#111;">Verify Your Account</h3>
            <p style="color:#555; font-size:14px;">
              Use the OTP below to complete your verification process.
            </p>

            <div style="margin:25px 0;">
              <span style="
                display:inline-block;
                padding:15px 25px;
                font-size:28px;
                letter-spacing:5px;
                font-weight:bold;
                background:#f3f4f6;
                border-radius:8px;
                color:#111;
              ">
                {{OTP_CODE}}
              </span>
            </div>

            <p style="font-size:13px; color:#777;">
              This OTP is valid for <b>5 minutes</b>.
            </p>

            <p style="font-size:13px; color:#999; margin-top:20px;">
              If you didn’t request this, you can safely ignore this email.
            </p>
          </td>
        </tr>

        <tr>
          <td style="background:#f9fafb; padding:15px; text-align:center; font-size:12px; color:#888;">
            © 2026 Trialshopy. All rights reserved.
          </td>
        </tr>

      </table>
    </td>
  </tr>
</table>
  </body>
</html>
